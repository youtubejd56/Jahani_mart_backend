services:
  - type: web
    name: jahani-backend
    runtime: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: "app.settings"
      - key: ALLOWED_HOSTS
        value: "jahani-mart-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://jahani-mart-frontend.onrender.com"
      - key: DATABASE_URL
        value: "postgresql://neondb_owner:npg_lbh86WCGBeDt@ep-hidden-bread-a1y4ehiu-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require"
